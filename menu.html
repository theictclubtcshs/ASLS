<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ASLS - Main Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .menu-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: #186E00;
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            position: relative;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            position: relative;
        }

        .date-time {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            margin-top: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .content {
            padding: 30px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            padding: 25px;
            border: none;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .menu-btn:hover::before {
            left: 100%;
        }

        .menu-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .menu-btn:active {
            transform: translateY(0);
        }

        .menu-btn.login {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .menu-btn.logout {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .menu-btn .icon {
            font-size: 2rem;
            margin-right: 20px;
            width: 40px;
            text-align: center;
        }

        .menu-btn .text {
            flex: 1;
            text-align: left;
        }

        .menu-btn .arrow {
            font-size: 1.5rem;
            opacity: 0.7;
            transition: transform 0.3s ease;
        }

        .menu-btn:hover .arrow {
            transform: translateX(10px);
        }

        .stats-section {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
        }

        .stats-title {
            color: #2c3e50;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #186E00;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #7f8c8d;
            text-transform: uppercase;
        }

        .info-section {
            background: #e8f5e9;
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 5px solid #186E00;
        }

        .info-icon {
            font-size: 2rem;
        }

        .info-text {
            flex: 1;
            color: #2c3e50;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .quick-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            color: #2c3e50;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .quick-btn:hover {
            border-color: #186E00;
            background: #f1f8e9;
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #95a5a6;
            font-size: 0.9rem;
            border-top: 1px solid #ecf0f1;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            background: #27ae60;
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .menu-btn {
                padding: 20px;
                font-size: 1.2rem;
            }
            
            .menu-btn .icon {
                font-size: 1.5rem;
                margin-right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div class="header">
            <h1>ASLS</h1>
            <p>Automated Student Log System</p>
            <div class="date-time" id="currentDateTime">
                Loading...
            </div>
        </div>

        <div class="content">
            <div class="info-section">
                <div class="info-icon">ℹ️</div>
                <div class="info-text">
                    <strong>Camera Access Required</strong><br>
                    Please allow camera access when prompted
                </div>
            </div>

            <div class="menu-buttons">
                <button class="menu-btn login" onclick="openLogin()">
                    <span class="icon">🔵</span>
                    <span class="text">LOG IN</span>
                    <span class="arrow">→</span>
                </button>
                
                <button class="menu-btn logout" onclick="openLogout()">
                    <span class="icon">🔴</span>
                    <span class="text">LOG OUT</span>
                    <span class="arrow">→</span>
                </button>
            </div>

            <div class="stats-section">
                <div class="stats-title">
                    Today's Summary
                    <span class="status-badge" id="dateBadge"></span>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="loginCount">-</div>
                        <div class="stat-label">Log Ins</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="logoutCount">-</div>
                        <div class="stat-label">Log Outs</div>
                    </div>
                </div>
            </div>

            <div class="quick-actions">
                <button class="quick-btn" onclick="openSheet()">
                    <span>📊</span> Open Sheet
                </button>
                <button class="quick-btn" onclick="refreshStats()">
                    <span>🔄</span> Refresh
                </button>
            </div>

            <div class="footer">
                <p>© 2026 ASLS - All rights reserved</p>
                <p style="font-size: 0.8rem; margin-top: 5px;">Version 2.0 - Camera Ready</p>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - UPDATE THESE!
        // ============================================
        
        // Your Apps Script Web App URL (from earlier)
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz5neNE6fQqo2_9ihCqwLV-xeO3i8SzXJOhx6KMdqeHn50dBv_NzRkdfxHz07BNYkqe4g/exec';
        
        // Your GitHub Pages camera page URL
        const CAMERA_PAGE_URL = 'https://theictclubtcshs.github.io/ASLS/';  // UPDATE THIS!
        
        // Your Google Sheet URL (optional - for quick access)
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1of_KiJN3_xQx7sHEoIKi5sHNwnAD-XuSKqux5wyIyqI/edit?gid=2145235329#gid=2145235329';  // UPDATE THIS!

        // ============================================
        // FUNCTIONS
        // ============================================

        // Update date and time
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('currentDateTime').textContent = now.toLocaleDateString('en-US', options);
            
            // Update date badge
            const dateStr = now.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' });
            document.getElementById('dateBadge').textContent = dateStr;
        }

        // Open login page
        function openLogin() {
            window.open(CAMERA_PAGE_URL + '?action=Log%20in', '_blank', 'width=900,height=700');
        }

        // Open logout page
        function openLogout() {
            window.open(CAMERA_PAGE_URL + '?action=Log%20out', '_blank', 'width=900,height=700');
        }

        // Open Google Sheet
        function openSheet() {
            if (SHEET_URL !== 'YOUR_GOOGLE_SHEET_URL') {
                window.open(SHEET_URL, '_blank');
            } else {
                alert('Please set your Sheet URL in the script');
            }
        }

        // Fetch today's stats from Apps Script
        async function refreshStats() {
            try {
                document.getElementById('loginCount').textContent = '...';
                document.getElementById('logoutCount').textContent = '...';
                
                const response = await fetch(APPS_SCRIPT_URL + '?action=getTodayStats', {
                    method: 'GET',
                    mode: 'no-cors' // Use no-cors for simple requests
                });
                
                // Since we're using no-cors, we'll just show placeholder stats
                // In a real implementation, you'd want to parse the response
                setTimeout(() => {
                    document.getElementById('loginCount').textContent = '0';
                    document.getElementById('logoutCount').textContent = '0';
                }, 1000);
                
            } catch (error) {
                console.error('Error fetching stats:', error);
                document.getElementById('loginCount').textContent = '?';
                document.getElementById('logoutCount').textContent = '?';
            }
        }

        // Handle keyboard shortcuts
        function handleKeyPress(e) {
            // Press '1' for Login
            if (e.key === '1') {
                openLogin();
            }
            // Press '2' for Logout
            if (e.key === '2') {
                openLogout();
            }
            // Press 'r' for Refresh
            if (e.key === 'r' || e.key === 'R') {
                refreshStats();
            }
            // Press 's' for Sheet
            if (e.key === 's' || e.key === 'S') {
                openSheet();
            }
        }

        // Initialize
        window.onload = function() {
            updateDateTime();
            setInterval(updateDateTime, 1000); // Update every second
            refreshStats();
            setInterval(refreshStats, 30000); // Refresh stats every 30 seconds
            
            // Add keyboard listener
            window.addEventListener('keypress', handleKeyPress);
            
            // Focus on window for keyboard shortcuts
            window.focus();
        };

        // Cleanup
        window.onbeforeunload = function() {
            window.removeEventListener('keypress', handleKeyPress);
        };

        // Expose functions globally
        window.openLogin = openLogin;
        window.openLogout = openLogout;
        window.openSheet = openSheet;
        window.refreshStats = refreshStats;
    </script>
</body>
</html>
